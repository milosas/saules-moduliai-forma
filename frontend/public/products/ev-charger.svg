<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <rect width="200" height="160" rx="8" fill="#f0f4ff"/>
  <!-- Charger body -->
  <rect x="65" y="10" width="70" height="100" rx="10" fill="white" stroke="#012f7a" stroke-width="2"/>
  <!-- Screen -->
  <rect x="78" y="22" width="44" height="25" rx="4" fill="#001959"/>
  <text x="100" y="37" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">22 kW</text>
  <text x="100" y="44" text-anchor="middle" font-family="monospace" font-size="6" fill="#60a5fa">Charging...</text>
  <!-- Status LED -->
  <circle cx="100" cy="58" r="4" fill="#4ade80"/>
  <!-- Plug socket -->
  <circle cx="100" cy="80" r="14" fill="#f0f4ff" stroke="#012f7a" stroke-width="1.5"/>
  <circle cx="95" cy="76" r="2.5" fill="#012f7a"/>
  <circle cx="105" cy="76" r="2.5" fill="#012f7a"/>
  <circle cx="100" cy="85" r="2.5" fill="#012f7a"/>
  <!-- Cable -->
  <path d="M100 110 Q100 120 90 125 Q75 132 80 140" stroke="#012f7a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Plug end -->
  <rect x="76" y="138" width="10" height="8" rx="2" fill="#012f7a"/>
  <!-- Lightning icon -->
  <path d="M158 25 L150 45 L156 45 L148 65 L164 40 L157 40 L165 25Z" fill="#fd6d15" opacity="0.8"/>
  <!-- Car icon small -->
  <rect x="22" y="115" width="35" height="15" rx="4" fill="#012f7a" opacity="0.3"/>
  <circle cx="30" cy="132" r="4" fill="#012f7a" opacity="0.3"/>
  <circle cx="50" cy="132" r="4" fill="#012f7a" opacity="0.3"/>
  <!-- Label -->
  <text x="100" y="152" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#012f7a" font-weight="600">EV stotelė</text>
</svg>
