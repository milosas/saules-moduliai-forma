<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <rect width="200" height="160" rx="8" fill="#f0f4ff"/>
  <!-- Battery body -->
  <rect x="50" y="20" width="100" height="105" rx="8" fill="white" stroke="#012f7a" stroke-width="2"/>
  <!-- Battery top terminal -->
  <rect x="85" y="12" width="30" height="10" rx="3" fill="#012f7a"/>
  <!-- Charge level bars -->
  <rect x="62" y="38" width="76" height="14" rx="3" fill="#4ade80" opacity="0.9"/>
  <rect x="62" y="56" width="76" height="14" rx="3" fill="#4ade80" opacity="0.7"/>
  <rect x="62" y="74" width="76" height="14" rx="3" fill="#4ade80" opacity="0.5"/>
  <rect x="62" y="92" width="76" height="14" rx="3" fill="#dde8ff" opacity="0.5"/>
  <!-- Percentage -->
  <text x="100" y="70" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" fill="white" font-weight="700">75%</text>
  <!-- kWh label -->
  <text x="100" y="118" text-anchor="middle" font-family="Inter,sans-serif" font-size="9" fill="#012f7a">10.0 kWh</text>
  <!-- Lightning bolt -->
  <path d="M165 30 L155 55 L163 55 L153 80 L173 48 L163 48 L173 30Z" fill="#fd6d15" opacity="0.8"/>
  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#012f7a" font-weight="600">Energijos kaupiklis</text>
</svg>
