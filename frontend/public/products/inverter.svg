<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <rect width="200" height="160" rx="8" fill="#f0f4ff"/>
  <!-- Inverter box -->
  <rect x="45" y="15" width="110" height="110" rx="8" fill="white" stroke="#012f7a" stroke-width="2"/>
  <!-- Screen -->
  <rect x="60" y="30" width="80" height="35" rx="4" fill="#001959"/>
  <!-- Screen content -->
  <text x="100" y="50" text-anchor="middle" font-family="monospace" font-size="12" fill="#4ade80">5.0 kW</text>
  <text x="100" y="60" text-anchor="middle" font-family="monospace" font-size="7" fill="#60a5fa">Active</text>
  <!-- Status LEDs -->
  <circle cx="70" cy="78" r="3" fill="#4ade80"/>
  <circle cx="82" cy="78" r="3" fill="#4ade80"/>
  <circle cx="94" cy="78" r="3" fill="#facc15"/>
  <!-- Ventilation grills -->
  <line x1="60" y1="92" x2="140" y2="92" stroke="#dde8ff" stroke-width="1"/>
  <line x1="60" y1="96" x2="140" y2="96" stroke="#dde8ff" stroke-width="1"/>
  <line x1="60" y1="100" x2="140" y2="100" stroke="#dde8ff" stroke-width="1"/>
  <line x1="60" y1="104" x2="140" y2="104" stroke="#dde8ff" stroke-width="1"/>
  <line x1="60" y1="108" x2="140" y2="108" stroke="#dde8ff" stroke-width="1"/>
  <!-- DC/AC labels -->
  <rect x="55" y="115" width="25" height="14" rx="3" fill="#012f7a"/>
  <text x="67.5" y="125" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="600">DC</text>
  <rect x="120" y="115" width="25" height="14" rx="3" fill="#fd6d15"/>
  <text x="132.5" y="125" text-anchor="middle" font-family="Inter,sans-serif" font-size="8" fill="white" font-weight="600">AC</text>
  <!-- Arrow -->
  <line x1="85" y1="122" x2="115" y2="122" stroke="#012f7a" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#012f7a"/></marker></defs>
  <!-- Label -->
  <text x="100" y="148" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#012f7a" font-weight="600">Inverteris</text>
</svg>
