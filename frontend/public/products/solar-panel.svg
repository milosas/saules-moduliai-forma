<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160" fill="none">
  <rect width="200" height="160" rx="8" fill="#f0f4ff"/>
  <!-- Panel frame -->
  <rect x="30" y="20" width="140" height="100" rx="4" fill="#1a1a2e" stroke="#012f7a" stroke-width="2"/>
  <!-- Grid lines horizontal -->
  <line x1="30" y1="45" x2="170" y2="45" stroke="#2a2a4e" stroke-width="1"/>
  <line x1="30" y1="70" x2="170" y2="70" stroke="#2a2a4e" stroke-width="1"/>
  <line x1="30" y1="95" x2="170" y2="95" stroke="#2a2a4e" stroke-width="1"/>
  <!-- Grid lines vertical -->
  <line x1="65" y1="20" x2="65" y2="120" stroke="#2a2a4e" stroke-width="1"/>
  <line x1="100" y1="20" x2="100" y2="120" stroke="#2a2a4e" stroke-width="1"/>
  <line x1="135" y1="20" x2="135" y2="120" stroke="#2a2a4e" stroke-width="1"/>
  <!-- Cells with blue tint -->
  <rect x="31" y="21" width="34" height="24" rx="1" fill="#0a1628" opacity="0.8"/>
  <rect x="66" y="21" width="34" height="24" rx="1" fill="#0d1e3a" opacity="0.8"/>
  <rect x="101" y="21" width="34" height="24" rx="1" fill="#0a1628" opacity="0.8"/>
  <rect x="136" y="21" width="33" height="24" rx="1" fill="#0d1e3a" opacity="0.8"/>
  <rect x="31" y="46" width="34" height="24" rx="1" fill="#0d1e3a" opacity="0.8"/>
  <rect x="66" y="46" width="34" height="24" rx="1" fill="#0a1628" opacity="0.8"/>
  <rect x="101" y="46" width="34" height="24" rx="1" fill="#0d1e3a" opacity="0.8"/>
  <rect x="136" y="46" width="33" height="24" rx="1" fill="#0a1628" opacity="0.8"/>
  <!-- Sun reflection -->
  <ellipse cx="60" cy="40" rx="20" ry="15" fill="white" opacity="0.08"/>
  <!-- Sun icon -->
  <circle cx="170" cy="18" r="12" fill="#fd6d15" opacity="0.9"/>
  <line x1="170" y1="2" x2="170" y2="6" stroke="#fd6d15" stroke-width="2" stroke-linecap="round"/>
  <line x1="182" y1="6" x2="179" y2="9" stroke="#fd6d15" stroke-width="2" stroke-linecap="round"/>
  <line x1="186" y1="18" x2="182" y2="18" stroke="#fd6d15" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="100" y="145" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#012f7a" font-weight="600">Saulės modulis</text>
</svg>
